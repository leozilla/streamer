syntax = "proto3";

package grpc_api;

service Streamer {
    rpc GetConfig (GetConfigRequest) returns (GetConfigReply) {}
    rpc SetConfig (SetConfigRequest) returns (SetConfigReply) {}

    rpc ListProvisionedStreams (ListProvisionedStreamsRequest) returns (ListProvisionedStreamsReply) {}
    
    rpc ProvisionStream (ProvisionStreamRequest) returns (ProvisionStreamReply) {}
    rpc DeprovisionStream (DeprovisionStreamRequest) returns (DeprovisionStreamReply) {}
}

message GetConfigRequest {
}

message GetConfigReply {
    uint32 total_supported_streams = 1;
}

message SetConfigRequest {
    uint32 total_supported_streams = 1;
}

message SetConfigReply {
}

message ListProvisionedStreamsRequest {
}

message ListProvisionedStreamsReply {
    repeated ShortStreamDescription streams = 1;
}

message ProvisionStreamRequest {
    uint32 source_port = 1;
    uint32 sink_port = 2;
    string description = 3;
}

message ProvisionStreamReply {
    FullStreamDescription stream = 1;
}

message DeprovisionStreamRequest {
    string stream_id = 3;
}

message DeprovisionStreamReply {
}

message ShortStreamDescription {
    string id = 1;
    uint32 source_port = 2;
    uint32 sink_port = 3;
}

message FullStreamDescription {
    string id = 1;
    uint32 source_port = 2;
    uint32 sink_port = 3;
}

