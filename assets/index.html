<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Management Console</title>
    <!-- Load protobuf.js for working with protobuf messages in the browser -->
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #log { background: #f4f4f4; padding: 10px; height: 400px; overflow-y: auto; font-family: monospace; border: 1px solid #ccc; }
        .status-connected { color: green; font-weight: bold; }
        .status-disconnected { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Streamer Management Console</h1>
    <p>WebSocket Status: <span id="status" class="status-disconnected">Disconnected</span></p>
    
    <h2>Provisioned Streams</h2>
    <ul id="streams-list"></ul>

    <h2>Activity Log</h2>
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const streamsListEl = document.getElementById('streams-list');
        let ws; // WebSocket instance
        
        function log(message) {
            const el = document.createElement('div');
            el.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(el);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function addStreamToList(evt) {
            let li = document.getElementById(`stream-${evt.stream_id}`);
            if (li) return;

            li = document.createElement('li');
            li.id = `stream-${evt.stream_id}`;
            
            const text = document.createElement('span');
            text.textContent = `ID: ${evt.stream_id} | Source: ${evt.source_port} -> Sink: ${evt.sink_port}`;
            li.appendChild(text);

            const btn = document.createElement('button');
            btn.textContent = 'Subscribe';
            btn.style.marginLeft = '10px';
            btn.onclick = () => toggleSubscription(evt.stream_id, btn);
            li.appendChild(btn);

            streamsListEl.appendChild(li);
        }

        function removeStreamFromList(evt) {
            let li = document.getElementById(`stream-${evt.stream_id}`);
            if (li) {
                li.remove();
            }
        }

        function toggleSubscription(streamId, btn) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Cannot change subscription: WebSocket is not open');
                return;
            }

            const isSubscribing = btn.textContent === 'Subscribe';
            let payload;
            
            if (isSubscribing) {
                payload = { payload: { SubscribeStreamRequest: { stream_id: streamId } } };
            } else {
                payload = { payload: { UnsubscribeStreamRequest: { stream_id: streamId } } };
            }
            
            ws.send(JSON.stringify(payload));
            log(`Sent ${isSubscribing ? 'SubscribeStreamRequest' : 'UnsubscribeStreamRequest'} for stream ${streamId}`);
            
            btn.textContent = isSubscribing ? 'Unsubscribe' : 'Subscribe';
        }

        // Define the proto schema directly in the client
        const protoDefinition = `
            syntax = "proto3";
            package ws_api;

            message WsRx {
                oneof payload {
                    SubscribeStreamsRequest subscribe_streams_request = 1;
                    SubscribeStreamRequest subscribe_stream_request = 2;
                    UnsubscribeStreamRequest unsubscribe_stream_request = 3;
                }
            }

            message SubscribeStreamsRequest {
            }

            message SubscribeStreamRequest {
                string stream_id = 1;
            }

            message UnsubscribeStreamRequest {
                string stream_id = 1;
            }

            message WsTx {
                oneof payload {
                    SubscribeStreamsReply subscribe_streams_reply = 1;
                    SubscribeStreamReply subscribe_stream_reply = 2;
                    UnsubscribeStreamReply unsubscribe_stream_reply = 3;
                    StreamProvisionedEvent stream_provisioned_event = 4;
                    StreamDeprovisionedEvent stream_deprovisioned_event = 5;
                    StreamRxPortUpdateEvent stream_rx_port_update_event = 6;
                }
            }

            message SubscribeStreamsReply {
                uint32 status = 1;
                string message = 2;
            }

            message SubscribeStreamReply {
                uint32 status = 1;
                string message = 2;
            }

            message UnsubscribeStreamReply {
                uint32 status = 1;
                string message = 2;
            }

            message StreamProvisionedEvent {
                string stream_id = 1;
                uint32 source_port = 2;
                uint32 sink_port = 3;
            }

            message StreamDeprovisionedEvent {
                string stream_id = 1;
            }

            message StreamRxPortUpdateEvent {
                uint32 source_port = 1;
                uint32 sum_packets_received = 2;
                uint64 sum_bytes_received = 3;    
            }
        `;

        try {
            // Parse the protobuf definition
            const parsed = protobuf.parse(protoDefinition);
            const root = parsed.root;

            // Connect to the WebSocket (Syncing port to 3000 to match backend)
            const wsUrl = `ws://${window.location.hostname || 'localhost'}:3000/ws`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'status-connected';
                log(`Connected to ${wsUrl}`);

                // Send the WsRx wrapper with the SubscribeRequest variant
                const message = {
                    payload: {
                        SubscribeStreamsRequest: {}
                    }
                };
                const jsonPayload = JSON.stringify(message);
                
                ws.send(jsonPayload);
                log('Sent WsRx (SubscribeRequest) as JSON');
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.payload && msg.payload.SubscribeStreamsReply) {
                        log(`Received SubscribeStreamsReply: ${JSON.stringify(msg.payload.SubscribeStreamsReply)}`);
                    } else if (msg.payload && msg.payload.StreamProvisionedEvent) {
                        const event = msg.payload.StreamProvisionedEvent;
                        log(`Received StreamProvisionedEvent: ${JSON.stringify(event)}`);
                        addStreamToList(event);
                    } else if (msg.payload && msg.payload.StreamDeprovisionedEvent) {
                        const event = msg.payload.StreamDeprovisionedEvent;
                        log(`Received StreamDeprovisionedEvent: ${JSON.stringify(event)}`);
                        removeStreamFromList(event);
                    } else {
                        log(`Received unknown message: ${JSON.stringify(msg)}`);
                    }
                } catch (e) {
                    log(`Failed to parse incoming JSON: ${e.message}`);
                }
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'status-disconnected';
                log('Connection closed');
            };

            ws.onerror = (error) => {
                log(`WebSocket Error occurred`);
            };

        } catch (error) {
            log(`Initialization error: ${error.message}`);
        }
    </script>
</body>
</html>
